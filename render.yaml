services:
  - type: web
    name: neuroshield-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
    rootDirectory: backend
    # Note: SQLite will reset on redeploy. Use a persistent disk or Postgres for production.
    disk:
      name: neuroshield-data
      mountPath: /app/uploads
      sizeGB: 1
